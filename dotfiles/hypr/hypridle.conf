# hypridle config — drives the screen lifecycle for the niri+quickshell setup.
# Locking is delegated to the quickshell session-lock service via IPC; DPMS
# is delegated to niri's native power-{on,off}-monitors action. No Hyprland-
# specific tools are referenced.

general {
    lock_cmd         = qs -p /home/mm-2103/projects/personal/quickshell-bar ipc call lock open
    before_sleep_cmd = qs -p /home/mm-2103/projects/personal/quickshell-bar ipc call lock open
    after_sleep_cmd  = niri msg action power-on-monitors
}

listener {
    timeout    = 300                                                      # 5 min
    on-timeout = qs -p /home/mm-2103/projects/personal/quickshell-bar ipc call lock open
}

listener {
    timeout    = 330                                                      # 5.5 min
    on-timeout = niri msg action power-off-monitors
    on-resume  = niri msg action power-on-monitors
}
